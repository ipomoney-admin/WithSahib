name: Build Check

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://www.withsahib.com
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
          NEXT_PUBLIC_BING_SITE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_BING_SITE_VERIFICATION }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          NEXT_PUBLIC_RAZORPAY_PLAN_BASIC_MONTHLY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_PLAN_BASIC_MONTHLY }}
          NEXT_PUBLIC_RAZORPAY_PLAN_BASIC_YEARLY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_PLAN_BASIC_YEARLY }}
          NEXT_PUBLIC_RAZORPAY_PLAN_PRO_MONTHLY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_PLAN_PRO_MONTHLY }}
          NEXT_PUBLIC_RAZORPAY_PLAN_PRO_YEARLY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_PLAN_PRO_YEARLY }}
          NEXT_PUBLIC_RAZORPAY_PLAN_ELITE_MONTHLY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_PLAN_ELITE_MONTHLY }}
          NEXT_PUBLIC_RAZORPAY_PLAN_ELITE_YEARLY: ${{ secrets.NEXT_PUBLIC_RAZORPAY_PLAN_ELITE_YEARLY }}
